    fill="none" stroke="#c084fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
    pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
    <animate attributeName="stroke-dashoffset" from="1" to="0" dur="0.35s" begin="1.69s" fill="freeze"/>
