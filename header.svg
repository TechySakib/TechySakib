    fill="none" stroke="#e879f9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
    pathLength="1" stroke-dasharray="1" stroke-dashoffset="1">
    <animate attributeName="stroke-dashoffset" from="1" to="0" dur="0.4s" begin="3.44s" fill="freeze"/>
  </path>

  <path id="i-stroke"
    d="M580,128 L580,162 M580,112 L580,118"
    fill="none" stroke="#e879f9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
