<text x="450" y="200" text-anchor="middle"
  font-family="'Courier New', 'Lucida Console', monospace"
  font-size="11" fill="#a78bfa" letter-spacing="6" opacity="0">
  AI ENTHUSIAST  ·  CSE STUDENT  ·  BANGLADESH
  <animate attributeName="opacity" values="0;0.8" dur="0.8s" begin="5s" fill="freeze"/>
</text>
</svg>
