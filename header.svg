<svg width="100%" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Nazmus Sakib - animated signature header</title>
<desc>Deep purple wave banner with handwritten animated signature of Nazmus Sakib</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d0221"/>
    <stop offset="50%" stop-color="#1e0a3c"/>
    <stop offset="100%" stop-color="#0d0221"/>
  </linearGradient>
  <linearGradient id="waveg1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#0d0221" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="waveg2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0d0221" stop-opacity="0.8"/>
  </linearGradient>
</defs>

<rect width="900" height="240" fill="url(#bg)"/>

<circle cx="80" cy="50" r="60" fill="#4c1d95" fill-opacity="0.18"/>
<circle cx="820" cy="40" r="80" fill="#6d28d9" fill-opacity="0.12"/>
<circle cx="450" cy="20" r="40" fill="#7c3aed" fill-opacity="0.1"/>

<path d="M0,190 C150,160 300,210 450,185 C600,160 750,205 900,180 L900,240 L0,240 Z" fill="url(#waveg1)">
  <animate attributeName="d" dur="6s" repeatCount="indefinite"
    values="
      M0,190 C150,160 300,210 450,185 C600,160 750,205 900,180 L900,240 L0,240 Z;
      M0,182 C150,205 300,170 450,195 C600,215 750,175 900,192 L900,240 L0,240 Z;
      M0,190 C150,160 300,210 450,185 C600,160 750,205 900,180 L900,240 L0,240 Z
    "/>
</path>
<path d="M0,205 C200,182 400,220 600,198 C750,180 850,215 900,200 L900,240 L0,240 Z" fill="url(#waveg2)">
  <animate attributeName="d" dur="9s" repeatCount="indefinite"
    values="
      M0,205 C200,182 400,220 600,198 C750,180 850,215 900,200 L900,240 L0,240 Z;
      M0,200 C200,218 400,190 600,212 C750,225 850,195 900,210 L900,240 L0,240 Z;
      M0,205 C200,182 400,220 600,198 C750,180 850,215 900,200 L900,240 L0,240 Z
    "/>
</path>

<g opacity="0.5">
  <circle cx="120" cy="70" r="1.5" fill="#c084fc"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="220" cy="35" r="1" fill="#e879f9"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="55" r="2" fill="#a78bfa"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="90" r="1.5" fill="#c084fc"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="55" cy="120" r="1" fill="#e879f9"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="855" cy="110" r="1" fill="#c084fc"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="350" cy="30" r="1.5" fill="#818cf8"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/></circle>
</g>

